<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    Alias /power /var/www/html/power

    <Directory /var/www/html/power>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/power-monitor-error.log
    CustomLog ${APACHE_LOG_DIR}/power-monitor-access.log combined
</VirtualHost>
